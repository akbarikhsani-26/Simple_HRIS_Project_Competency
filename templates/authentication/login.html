{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block auth_content %}
<div class="auth-card glass-panel">
    <div style="text-align: center; margin-bottom: 2rem;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Selamat Datang</h1>
        <p>Silakan masuk ke akun HRIS Anda</p>
    </div>

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}

        {% if form.errors %}
        <div
            style="background-color: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem;">
            Email atau password salah. Silakan coba lagi.
        </div>
        {% endif %}

        <div class="form-group">
            <label class="form-label" for="id_username">Email</label>
            <input type="email" name="username" id="id_username" class="form-control" required autofocus
                placeholder="Email">
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
            <label class="form-label" for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control" required
                placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; font-size: 1rem;">
            Masuk
        </button>
    </form>
</div>
{% endblock %}
